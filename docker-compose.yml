version: '3.8'

services:
  auto-cnc:
    build: .
    container_name: auto-cnc-drill
    ports:
      - "8000:8000"
    volumes:
      - ./config:/app/config:ro
      - ./logs:/app/logs
      - ./jobs:/app/jobs
      - ./calibration:/app/calibration
    environment:
      - CNC_PORT=/dev/ttyUSB0
      - CNC_BAUDRATE=115200
      - CAMERA_INDEX=0
      - YOLO_MODEL_PATH=models/best.pt
      - LOG_LEVEL=INFO
    devices:
      - /dev/ttyUSB0:/dev/ttyUSB0
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/status"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Optional: Watchtower for auto-updates
  watchtower:
    image: containrrr/watchtower
    container_name: watchtower
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - WATCHTOWER_INTERVAL=3600
    command: --cleanup
    profiles:
      - optional