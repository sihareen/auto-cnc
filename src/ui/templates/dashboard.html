<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Auto CNC Main Menu</title>
  <style>
    :root {
      --bg: #eef2f7;
      --card: #ffffff;
      --line: #d6deea;
      --text: #182235;
      --muted: #5a6b84;
      --blue: #1b68d7;
      --green: #148a4f;
      --mono: "JetBrains Mono", Consolas, monospace;
      --sans: "Inter", "Segoe UI", sans-serif;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at 20% 20%, #f8fbff 0%, #eef2f7 45%, #e6ebf3 100%);
      font-family: var(--sans);
      color: var(--text);
      padding: 20px;
    }
    .menu {
      width: min(560px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 24px;
      box-shadow: 0 12px 30px rgba(18, 33, 59, 0.08);
    }
    h1 {
      margin: 0;
      font-size: 28px;
      line-height: 1.2;
    }
    p {
      margin: 10px 0 20px;
      color: var(--muted);
      font: 500 13px var(--mono);
    }
    .actions {
      display: grid;
      gap: 12px;
    }
    .btn {
      display: block;
      text-decoration: none;
      border-radius: 10px;
      padding: 14px 16px;
      font: 700 14px var(--mono);
      border: 1px solid transparent;
      transition: transform .12s ease, box-shadow .12s ease;
    }
    .btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 8px 18px rgba(18, 33, 59, 0.12);
    }
    .btn-drill {
      background: #e9f5ee;
      border-color: #b9dfc8;
      color: var(--green);
    }
    .btn-map {
      background: #eaf1fb;
      border-color: #bfd3f6;
      color: var(--blue);
    }
  </style>
</head>
<body>
  <main class="menu">
    <h1>Auto CNC Main Menu</h1>
    <p>Pilih mode kerja:</p>
    <div class="actions">
      <a class="btn btn-drill" href="/drill">Open /drill</a>
      <a class="btn btn-map" href="/mapping">Open /mapping</a>
    </div>
  </main>
</body>
</html>
